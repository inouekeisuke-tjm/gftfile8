<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | GFT File</title>
  <link rel="icon" type="image/png" href="/fbcn.png" />
  <link rel="stylesheet" href="/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      margin: 0;
      padding: 20px;
    }
    .login-box {
      width: 100%;
      max-width: 400px;
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
    }
    .login-box h1 {
      margin-bottom: 8px;
      color: #333;
    }
    .login-box p {
      color: #666;
      margin-bottom: 30px;
      font-size: 0.9rem;
    }
    .input-wrapper {
      text-align: left;
      margin-bottom: 20px;
    }
    .input-wrapper label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 0.85rem;
      color: #555;
    }
    .input-wrapper input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 1rem;
    }
    #login-btn {
      width: 100%;
      padding: 14px;
      background-color: #2c3e50;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.3s;
    }
    #login-btn:hover {
      background-color: #34495e;
    }
    #error-msg {
      color: #e74c3c;
      font-size: 0.85rem;
      margin-top: 15px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>GFT File</h1>
    <p>施工資料自動化システムへログイン</p>
    <div class="input-wrapper">
      <label for="email">メールアドレス</label>
      <input type="email" id="email" placeholder="example@tjmdesign.com">
    </div>
    <div class="input-wrapper">
      <label for="password">パスワード</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>
    <button id="login-btn">ログイン</button>
    <div id="error-msg">ユーザー名またはパスワードが正しくありません。</div>
  </div>
  <script type="module" src="/login.js"></script>
</body>
</html>
